<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التحقق من التسجيلات — صوتك</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --gold: #d4a843; --bg: #0d0d0d; --card: #1a1a1a; --text: #f0f0f0; --muted: #888; --green: #43a047; --red: #e53935; --orange: #fb8c00; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Arial, sans-serif; min-height: 100vh; }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; border-bottom: 1px solid #222; }
  .logo { color: var(--gold); font-size: 1.4rem; font-weight: bold; text-decoration: none; }
  h1 { text-align: center; color: var(--gold); margin: 1.5rem 0 0.5rem; font-size: 1.5rem; }
  .card { background: var(--card); border-radius: 20px; padding: 2rem; max-width: 620px; margin: 1rem auto; width: 92%; }
  .prompt-label { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.4rem; }
  .prompt-box { background: #111; border-radius: 10px; padding: 1rem; font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.7; }
  audio { width: 100%; border-radius: 10px; margin: 0.5rem 0; }
  .transcription { background: #111; border-radius: 10px; padding: 1rem; color: #ccc; font-size: 1rem; line-height: 1.7; margin: 1rem 0; white-space: pre-wrap; }
  .vote-area { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 2rem; }
  .vote-btn { flex: 1; min-width: 140px; border: 2px solid #333; border-radius: 14px; padding: 1.2rem 1rem; cursor: pointer; font-size: 1rem; text-align: center; transition: all 0.2s; background: transparent; color: var(--text); }
  .vote-btn:hover { transform: translateY(-2px); }
  .vote-yes { border-color: var(--green); }
  .vote-yes:hover { background: var(--green); color: #fff; }
  .vote-partial { border-color: var(--orange); }
  .vote-partial:hover { background: var(--orange); color: #fff; }
  .vote-no { border-color: var(--red); }
  .vote-no:hover { background: var(--red); color: #fff; }
  .vote-icon { font-size: 1.8rem; display: block; margin-bottom: 0.5rem; }
  .empty { text-align: center; padding: 4rem; color: var(--muted); }
  .empty .big { font-size: 3rem; }
  .badge { display: inline-block; background: #2a2a2a; border: 1px solid #444; border-radius: 20px; padding: 0.3rem 1rem; font-size: 0.8rem; color: var(--gold); margin-bottom: 1rem; }
  .counter { text-align: center; color: var(--muted); font-size: 0.9rem; margin-top: 1rem; }
  .counter span { color: var(--gold); font-weight: bold; }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">← صوتك</a>
</nav>

<h1>👂 التحقق من التسجيلات</h1>

<div id="card-area">
  <div class="card" id="item-card" style="display:none">
    <div class="badge" id="type-badge">...</div>
    <div class="prompt-label">السؤال الذي طُرح:</div>
    <div class="prompt-box" id="prompt-box">...</div>

    <div id="audio-area" style="display:none">
      <div class="prompt-label">التسجيل الصوتي:</div>
      <audio id="audio-player" controls></audio>
    </div>

    <div id="transcription-area" style="display:none">
      <div class="prompt-label">ما قاله المتحدث:</div>
      <div class="transcription" id="transcription-text"></div>
    </div>

    <div id="text-area" style="display:none">
      <div class="prompt-label">النص المكتوب:</div>
      <div class="transcription" id="content-text"></div>
    </div>

    <div class="vote-area">
      <button class="vote-btn vote-yes" onclick="vote('validated')">
        <span class="vote-icon">✅</span>
        نعم، هذه حسانية أصيلة
      </button>
      <button class="vote-btn vote-partial" onclick="vote('partial')">
        <span class="vote-icon">⚠️</span>
        جيد لكن فيه خلط
      </button>
      <button class="vote-btn vote-no" onclick="vote('rejected')">
        <span class="vote-icon">❌</span>
        ليست حسانية
      </button>
    </div>

    <div class="counter">لقد راجعت <span id="validated-count">0</span> تسجيل اليوم</div>
  </div>

  <div class="empty" id="empty-state" style="display:none">
    <div class="big">🎉</div>
    <p>لا توجد تسجيلات تحتاج إلى مراجعة حالياً</p>
    <p style="margin-top:1rem"><a href="/" style="color:var(--gold)">العودة للرئيسية</a></p>
  </div>
</div>

<script>
let currentItem = null, sessionCount = 0;
const TYPE_LABELS = { voice:'تسجيل صوتي', text:'نص مكتوب', story:'قصة', import:'مستورد' };

async function loadNext() {
  try {
    const r = await fetch('/api/contribute/next-for-validation');
    currentItem = await r.json();
    if (!currentItem) { showEmpty(); return; }
    showItem(currentItem);
  } catch { showEmpty(); }
}

function showItem(item) {
  document.getElementById('item-card').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('type-badge').textContent = TYPE_LABELS[item.type] || item.type;
  document.getElementById('prompt-box').textContent = item.prompt_used || 'بدون سؤال محدد';

  const audioArea = document.getElementById('audio-area');
  const transcArea = document.getElementById('transcription-area');
  const textArea = document.getElementById('text-area');

  audioArea.style.display = 'none';
  transcArea.style.display = 'none';
  textArea.style.display = 'none';

  if (item.audio_file) {
    document.getElementById('audio-player').src = `/uploads/${item.audio_file}`;
    audioArea.style.display = 'block';
  }
  if (item.content_text && item.type !== 'voice') {
    document.getElementById('content-text').textContent = item.content_text;
    textArea.style.display = 'block';
  }
  if (item.content_text && item.audio_file) {
    document.getElementById('transcription-text').textContent = item.content_text;
    transcArea.style.display = 'block';
  }
}

function showEmpty() {
  document.getElementById('item-card').style.display = 'none';
  document.getElementById('empty-state').style.display = 'block';
}

async function vote(verdict) {
  if (!currentItem) return;
  try {
    await fetch('/api/contribute/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contribution_id: currentItem.id, result: verdict }),
    });
    sessionCount++;
    document.getElementById('validated-count').textContent = sessionCount;
    loadNext();
  } catch { loadNext(); }
}

loadNext();
</script>
</body>
</html>
